services:
  polymarket:
    build: .
    image: openbb-polymarket
    ports:
      - "7779:7779"
    volumes:
      - polymarket-cache:/data/cache
    environment:
      POLYMARKET_CACHE_DIR: /data/cache
      # POLYMARKET_CACHE_SIZE_LIMIT: "1073741824"
      # POLYMARKET_STATS_TTL_SECONDS: "600"
    init: true
    restart: unless-stopped

volumes:
  polymarket-cache:

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <title>Polymarket — Prediction Markets Data App for OpenBB Workspace</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A66FF"/>
      <stop offset="0.55" stop-color="#2E5CFF"/>
      <stop offset="1" stop-color="#1E45D8"/>
    </linearGradient>
    <linearGradient id="curveFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="card"><rect x="0" y="0" width="1200" height="675" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Brand field -->
    <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>

    <!-- Subtle grid / market motif, low opacity -->
    <g stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1">
      <line x1="0" y1="168" x2="1200" y2="168"/>
      <line x1="0" y1="337" x2="1200" y2="337"/>
      <line x1="0" y1="506" x2="1200" y2="506"/>
    </g>

    <!-- Faint probability / price curve bleeding off the right edge -->
    <path d="M 540 470 C 660 455, 720 500, 820 430 S 980 250, 1070 300 S 1180 150, 1280 180"
          fill="none" stroke="url(#curveFade)" stroke-width="6" stroke-linecap="round" stroke-opacity="0.85"/>
    <path d="M 540 470 C 660 455, 720 500, 820 430 S 980 250, 1070 300 S 1180 150, 1280 180 L 1280 700 L 540 700 Z"
          fill="#FFFFFF" fill-opacity="0.05"/>
    <circle cx="820" cy="430" r="6" fill="#FFFFFF" fill-opacity="0.55"/>
    <circle cx="1070" cy="300" r="6" fill="#FFFFFF" fill-opacity="0.7"/>

    <!-- Faint YES / NO chips, kept fully inside the frame so the labels never clip -->
    <g font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600">
      <g opacity="0.16">
        <rect x="930" y="470" width="180" height="58" rx="29" fill="#FFFFFF"/>
        <text x="965" y="508" font-size="30" fill="#2E5CFF">YES 63¢</text>
      </g>
      <g opacity="0.12">
        <rect x="980" y="548" width="180" height="58" rx="29" fill="none" stroke="#FFFFFF" stroke-width="3"/>
        <text x="1012" y="586" font-size="30" fill="#FFFFFF">NO 37¢</text>
      </g>
    </g>

    <!-- ===== Polymarket MARK (vector recreation: tall left spine + two mirrored chevron bands) ===== -->
    <g transform="translate(150,196)">
      <rect x="0" y="0" width="40" height="284" fill="#FFFFFF"/>
      <polygon points="40,0 196,40 196,92 40,128" fill="#FFFFFF"/>
      <polygon points="40,156 196,192 196,244 40,284" fill="#FFFFFF"/>
    </g>

    <!-- Wordmark + tagline lockup -->
    <g font-family="Inter, Helvetica, Arial, sans-serif">
      <text x="372" y="338" font-size="118" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Polymarket</text>
      <text x="376" y="402" font-size="36" font-weight="500" fill="#FFFFFF" fill-opacity="0.82" letter-spacing="1.5">Prediction Markets Data</text>
    </g>

    <!-- OpenBB Workspace footer tag -->
    <g font-family="Inter, Helvetica, Arial, sans-serif">
      <text x="150" y="612" font-size="26" font-weight="600" fill="#FFFFFF" fill-opacity="0.72" letter-spacing="2">OPENBB WORKSPACE APP</text>
    </g>
  </g>

  <!-- Crisp inner hairline frame -->
  <rect x="0.5" y="0.5" width="1199" height="674" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
</svg>
